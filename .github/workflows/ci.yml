name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm --filter api db:generate

      - name: Create metadata stub
        run: |
          echo "export default async (): Promise<Record<string, any>> => ({});" > apps/api/src/metadata.ts

      - name: Generate API client
        run: pnpm --filter web api:generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
